# ResNet8 on CIFAR-10 — harder classification task
experiment: cifar_resnet8
dataset: cifar10
model: resnet8
epochs: 10
batch_size: 128
seeds: [42, 43, 44]

threshold:
  metric: test_acc
  value: 0.70

optimizers:
  - name: sgd
    grid:
      lr: [0.01, 0.05, 0.1]
  - name: sgd_momentum
    grid:
      lr: [0.01, 0.05]
      momentum: [0.9]
  - name: nesterov
    grid:
      lr: [0.01, 0.05]
      momentum: [0.9]
  - name: adagrad
    grid:
      lr: [0.01, 0.03]
  - name: rmsprop
    grid:
      lr: [0.001, 0.003]
  - name: adam
    grid:
      lr: [0.0003, 0.001]
  - name: adamw
    grid:
      lr: [0.0003, 0.001]
      weight_decay: [0.01]